tools:
  - id: workspace_note
    description: Write a note to the run workspace
    input_schema:
      type: object
      properties:
        filename:
          type: string
        content:
          type: string
    output_schema:
      type: object
      properties:
        path:
          type: string
    side_effect_level: low
    permissions: [workspace_write]
    enabled: true
  - id: trace_lookup
    description: Look up a past run trace
    input_schema:
      type: object
      properties:
        run_id:
          type: string
    output_schema:
      type: object
      properties:
        run_id:
          type: string
        status:
          type: string
    side_effect_level: none
    permissions: [trace_read]
    enabled: true
  - id: file_read
    description: Read a repository file by relative path
    input_schema:
      type: object
      properties:
        path:
          type: string
    output_schema:
      type: object
      properties:
        path:
          type: string
        content:
          type: string
    side_effect_level: none
    permissions: [repo_read]
    enabled: true
  - id: file_write
    description: Write a repository file by relative path
    input_schema:
      type: object
      properties:
        path:
          type: string
        content:
          type: string
    output_schema:
      type: object
      properties:
        path:
          type: string
    side_effect_level: high
    permissions: [repo_write]
    enabled: true
  - id: message_user
    description: Queue a message for the user without returning it as the main response
    input_schema:
      type: object
      properties:
        text:
          type: string
    output_schema:
      type: object
      properties:
        path:
          type: string
        thread_id:
          type: string
    side_effect_level: low
    permissions: [user_message]
    enabled: true
  - id: delegate_task
    description: Create and dispatch a structured task to another agent worker
    input_schema:
      type: object
      properties:
        assigned_to:
          type: string
        goal:
          type: string
        input_context:
          type: string
    output_schema:
      type: object
    side_effect_level: high
    permissions: [task_dispatch]
    enabled: true
  - id: get_task
    description: Get a structured task by id
    input_schema:
      type: object
      properties:
        task_id:
          type: string
    output_schema:
      type: object
    side_effect_level: none
    permissions: [task_read]
    enabled: true
  - id: list_tasks
    description: List structured tasks
    input_schema:
      type: object
      properties:
        assigned_to:
          type: string
        created_by:
          type: string
        limit:
          type: integer
    output_schema:
      type: object
    side_effect_level: none
    permissions: [task_read]
    enabled: true
  - id: list_agents
    description: List registered agent profiles
    input_schema:
      type: object
      properties: {}
    output_schema:
      type: object
    side_effect_level: none
    permissions: [agent_read]
    enabled: true
  - id: worker_health
    description: Inspect worker adapter health
    input_schema:
      type: object
      properties: {}
    output_schema:
      type: object
    side_effect_level: none
    permissions: [worker_read]
    enabled: true
