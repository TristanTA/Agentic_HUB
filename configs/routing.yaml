routes:
  - id: planner_keyword_route
    match:
      type: contains_any
      values: [plan, roadmap, strategy]
    target_type: agent
    target_id: planner_agent
    reason: Planning keywords route to planner agent
  - id: fallback_general
    match:
      type: fallback
    target_type: agent
    target_id: vanta_manager
    reason: Default fallback route goes to the manager agent
