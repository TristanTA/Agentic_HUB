environment: development
hub:
  name: personal-ai-hub
  paused: false
  default_agent: vanta_manager
  log_level: INFO
  sqlite_path: data/hub.db
  structured_log_path: logs/structured.log
  human_log_path: logs/hub.log
  state_path: data/hub_state.json
  pid_path: data/hub.pid
telegram:
  enabled: true
  bot_token_env: TELEGRAM_BOT_TOKEN
  allowed_chat_ids: []
vanta:
  enabled: true
  interval_seconds: 300
  max_changes_per_cycle: 1
  escalation_threshold: high
  self_review_interval_cycles: 3
  protected_paths:
    - configs/agents.yaml
    - configs/models.yaml
    - configs/tools.yaml
