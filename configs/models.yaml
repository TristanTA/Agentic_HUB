models:
  - id: openai_gpt5_mini
    provider: openai
    model_name: gpt-5-mini
    timeout: 60
    defaults:
      reasoning:
        effort: medium
    enabled: true
  - id: openai_gpt5_vanta
    provider: openai
    model_name: gpt-5.2
    timeout: 90
    defaults:
      reasoning:
        effort: high
    enabled: true
  - id: echo_model
    provider: local
    model_name: echo
    timeout: 20
    defaults:
      temperature: 0
    enabled: true
