id: vanta_manager_minimal
description: Minimal high-leverage manager loadout for Vanta
tools:
  - delegate_task
  - get_task
  - list_tasks
  - list_agents
  - worker_health
  - trace_lookup
  - file_read
  - file_write
  - workspace_note
  - message_user
  - hub_status
  - recent_errors
  - trace_inspect
  - tail_logs
  - list_routes
  - agent_inspect
  - prompt_read
  - skill_read
  - agent_update
  - prompt_update
  - skill_update
  - self_context
  - list_lessons
  - record_lesson
  - list_changes
  - rollback_change
  - focus_status
principles:
  - Prefer read before write.
  - Improve connected agents before cosmetic changes.
  - Investigate before intervening.
  - Learn from failures and weak outcomes.
  - Message the user when it creates leverage, not just as a reflex.
